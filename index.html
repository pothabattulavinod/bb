<!DOCTYPE html>
<html lang="en">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

		<script src="https://ssl.p.jwpcdn.com/player/v/8.24.1/jwplayer.js"></script>
		<script>
			jwplayer.key = 'cLGMn8T20tGvW+0eXPhq4NNmLB57TrscPjd1IyJF84o=';
		</script>
		<style>
			body {
				margin: 0;
				overflow: hidden;
			}

			#player {
				width: 100%;
				height: 100%;
				overflow: hidden;
				background-color: #000;
			}

			/* Custom player styles */
			.jw-title-container {
				position: absolute;
				top: 10px;
				left: 10px;
				z-index: 10;
				color: #ff6347;
			}

			.jw-title-primary {
				font-weight: bold;
				font-size: 1.5em;
				color: #ff6347 !important;
			}

			.jwplayer .jw-progress {
				background-color: #ff6347;
			}

			.jwplayer .jw-text-time {
				color: #ff6347 !important;
			}

			button:hover {
				background: #ff6347 !important;
			}

			.jw-rightclick .jw-reset {
				display: none;
			}
		</style>
	</head>

	<body>
		<div id="player"></div>

		<script>
			var jwp = jwplayer('player');
			jwp.setup({
				aspectratio: "16:9",
				width: "100%",
				height: "100%",
				sources: [{
					file: "https://58a49ee706238.streamlock.net:8485/uploads/jio_1721615/fcfb7c40bbf79f0316037ce31a127a4b.mp4/index.m3u8",
					type: "mp4",
					default: true
				}],
				image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRQEcvHCkJZMTa1C4KiRemjH3etIWjkYsZEKuSn5ILGn0rXAkuaU218_fo&s=10",
				primary: "html5",
				preload: "auto",
				bufferLength: 5,
				hlshtml: true,
				controls: true,
				displayPlaybackLabel: false,
				playbackRateControls: true,
				liveTimeout: 2,
				dvrSeekLimit: 60,
				dvrWindow: 3600,
			});

			// Custom forward button to skip 10 seconds
			jwp.addButton(
				'https://www.kindpng.com/picc/b/79-797059_forward-icon-png.png',
				'Forward 10 seconds',
				function() {
					jwp.seek(jwp.getPosition() + 10);
				},
				'forward10'
			);
		</script>
	</body>

</html>
