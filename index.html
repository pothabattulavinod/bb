<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://ssl.p.jwpcdn.com/player/v/8.36.2/jwplayer.js"></script>
    <script>
        jwplayer.key = 'cLGMn8T20tGvW+0eXPhq4NNmLB57TrscPjd1IyJF84o=';
    </script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #player {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Custom player styles */
        .jw-title-primary {
            font-weight: bold;
            font-size: 1.5em;
            color: #ff6347 !important;
        }

        .jwplayer .jw-progress {
            background-color: #ff6347 !important;
        }

        .jwplayer .jw-text-time {
            color: #ff6347 !important;
        }

        .jwplayer .jw-button:hover {
            background: #ff6347 !important; /* Ensures button hover works */
        }

        .jw-rightclick .jw-reset {
            display: none;
        }
    </style>
</head>

<body>
    <div id="player"></div>

    <script>
        var jwp = jwplayer('player');
        jwp.setup({
            aspectratio: "16:9",
            width: "100%",
            height: "100%",
            sources: [{
                file: "https://pothabattulavinod.github.io/bb/bigboss.m3u8",
                type: "mp4",
                default: true
            }],
            image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRQEcvHCkJZMTa1C4KiRemjH3etIWjkYsZEKuSn5ILGn0rXAkuaU218_fo&s=10",
            primary: "html5",
            preload: "auto",
            title: "09 OCT 2024",  
            bufferLength: 5,
            hlshtml: true,
            controls: true,
            displayPlaybackLabel: false,
            playbackRateControls: true,
            liveTimeout: 2,
            dvrSeekLimit: 60,
            dvrWindow: 3600,

            
            logo: {
                file: "",  
                position: "top-right",  
                margin: 10, 
                link: "",  
                hide: false,  
                width: 100,  
                height: 50   
            }
        });

        // Custom forward button to skip 10 seconds
        jwp.addButton(
            'https://www.kindpng.com/picc/b/79-797059_forward-icon-png.png',
            'Forward 10 seconds',
            function() {
                jwp.seek(jwp.getPosition() + 10);
            },
            'forward10'
        );
    </script>
</body>

</html>
