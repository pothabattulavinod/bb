<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Hari E Techno School</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #0d47a1, #ffd54f); /* Krishna-inspired colors */
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #ffcc00; /* Golden yellow */
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
        }
        p {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #b3e5fc; /* Soft blue */
        }
        .countdown {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #ffd740; /* Yellow accent */
        }
        .admission {
            margin-top: 20px;
        }
        .admission a {
            display: inline-block;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #0d47a1; /* Deep blue */
            background-color: #ffcc00; /* Golden yellow */
            text-decoration: none;
            border-radius: 5px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .admission a:hover {
            transform: translateY(-2px);
            box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.4);
        }
        .social-buttons {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .social-buttons a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            background-color: #fff;
            border-radius: 50%;
            text-decoration: none;
            color: #0d47a1;
            font-size: 2rem; /* Larger size for thicker icons */
            font-weight: bold;
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .social-buttons a:hover {
            transform: translateY(-3px);
            box-shadow: 5px 5px 12px rgba(0, 0, 0, 0.4);
        }
        .social-buttons i {
            font-size: 2.5rem; /* Extra thickness for icons */
        }
        footer {
            margin-top: 50px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
    <!-- Include Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>Welcome to Hari E Techno School</h1>
        <p>Our new website is under construction.</p>
        <div class="countdown">Stay tuned for updates!</div>
        <div class="admission">
            <a href="tel:+917799114947">📞 Call Now for Admission</a>
        </div>
        <div class="social-buttons">
            <a href="https://wa.me/917799114947" target="_blank" title="WhatsApp">
                <i class="fab fa-whatsapp" style="color: #25d366;"></i>
            </a>
            <a href="https://www.instagram.com/harietechnoschool?igsh=aTZiaWtsazVrMXB0" target="_blank" title="Instagram">
                <i class="fab fa-instagram" style="color: #e4405f;"></i>
            </a>
            <a href="https://www.youtube.com/@harietechnoschool" target="_blank" title="YouTube">
                <i class="fab fa-youtube" style="color: #ff0000;"></i>
            </a>
        </div>
        <footer>&copy; 2024 Hari E Techno School. All rights reserved.</footer>
    </div>
</body>
</html>
