<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://ssl.p.jwpcdn.com/player/v/8.36.2/jwplayer.js"></script>
    <script>
        jwplayer.key = 'cLGMn8T20tGvW+0eXPhq4NNmLB57TrscPjd1IyJF84o=';
    </script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #player {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            position: relative;
        }

        /* Hide all controls except fullscreen */
        .jw-reset.jw-icon-play,
        .jw-reset.jw-icon-pause,
        .jw-reset.jw-icon-volume,
        .jw-reset.jw-icon-rewind,
        .jw-reset.jw-icon-forward,
        .jw-reset.jw-icon-next,
        .jw-reset.jw-icon-replay,
        .jw-reset.jw-icon-time,
        .jw-reset.jw-icon-playlist,
        .jw-reset.jw-icon-share,
        .jw-reset.jw-icon-captions,
        .jw-reset.jw-controlbar {
            display: none !important;
        }

        .jw-reset.jw-icon-fullscreen {
            display: block !important;
        }

        /* Hide time display */
        .jw-text-time {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="player"></div>

    <script>
        var jwp = jwplayer('player');

        var videos = [
            {
                file: "https://pothabattulavinod.github.io/se/Aay/video.m3u8",
                title: "Aay",
                duration: 8431,
                starttime: new Date("2025-02-05T00:00:00+05:30")
            },
            {
                file: "https://pothabattulavinod.github.io/se/Orange/video.m3u8",
                title: "Orange",
                duration: 9801,
                starttime: new Date("2025-02-04T23:13:21+05:30")
            }
        ];

        function getCurrentVideo() {
            let now = new Date();
            let selectedVideo = null;
            let seekPosition = 0;

            for (let video of videos) {
                let startTime = video.starttime;
                let endTime = new Date(startTime.getTime() + video.duration * 1000);

                if (now >= startTime && now < endTime) {
                    selectedVideo = video;
                    seekPosition = Math.floor((now - startTime) / 1000);
                    break;
                }
            }

            return { selectedVideo, seekPosition };
        }

        let { selectedVideo, seekPosition } = getCurrentVideo();

        if (selectedVideo) {
            jwp.setup({
                aspectratio: "16:9",
                width: "100%",
                height: "100%",
                sources: [{
                    file: selectedVideo.file,
                    type: "mp4",
                    default: true
                }],
                title: selectedVideo.title || "",
                primary: "html5",
                preload: "auto",
                bufferLength: 5,
                hlshtml: true,
                controls: false,  // Disable all controls
                displayPlaybackLabel: false,
                playbackRateControls: false,
                liveTimeout: 2,
                dvrSeekLimit: 0,
                dvrWindow: 0,
                autostart: true,
                mute: false // Unmute video by default
            });

            jwp.on('ready', function () {
                if (seekPosition > 0) {
                    jwp.seek(seekPosition);
                }

                // Start video playback immediately when the player is ready
                jwp.play();

                // Prevent touch or click from pausing the video
                document.querySelector('.jwplayer').addEventListener('click', function (event) {
                    event.stopPropagation();
                    event.preventDefault();
                });

                document.querySelector('.jwplayer').addEventListener('touchstart', function (event) {
                    event.stopPropagation();
                    event.preventDefault();
                });

                document.querySelector('.jwplayer').addEventListener('dblclick', function (event) {
                    event.stopPropagation();
                    event.preventDefault();
                });
            });

            jwp.on('pause', function () {
                jwp.play(); // Force playback to continue
            });

            jwp.on('complete', function () {
                console.log("Stream completed.");
            });
        } else {
            console.error("No currently playing video.");
        }
    </script>
</body>

</html>
