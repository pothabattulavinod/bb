<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://ssl.p.jwpcdn.com/player/v/8.36.2/jwplayer.js"></script>
    <script>
        jwplayer.key = 'cLGMn8T20tGvW+0eXPhq4NNmLB57TrscPjd1IyJF84o=';
    </script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        #player {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            position: relative;
        }

        #startButton {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 18px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        #startButton:hover {
            background-color: #0056b3;
        }

        /* Hide all controls except fullscreen */
        .jw-reset.jw-icon-play,
        .jw-reset.jw-icon-pause,
        .jw-reset.jw-icon-volume,
        .jw-reset.jw-icon-rewind,
        .jw-reset.jw-icon-forward,
        .jw-reset.jw-icon-next,
        .jw-reset.jw-icon-replay,
        .jw-reset.jw-icon-time,
        .jw-reset.jw-icon-playlist,
        .jw-reset.jw-icon-share,
        .jw-reset.jw-icon-captions,
        .jw-reset.jw-controlbar {
            display: none !important;
        }

        .jw-reset.jw-icon-fullscreen {
            display: block !important;
        }

        /* Hide time display */
        .jw-text-time {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="player"></div>
    <button id="startButton">Start Video</button>

    <script>
        var jwp = jwplayer('player');

        var videos = [
            {
                file: "https://pothabattulavinod.github.io/se/Aay/video.m3u8",
                title: "Aay",
                duration: 8431,
                starttime: new Date("2025-02-05T00:00:00+05:30")
            },
            {
                file: "https://pothabattulavinod.github.io/se/Orange/video.m3u8",
                title: "Orange",
                duration: 9801,
                starttime: new Date("2025-02-04T23:13:21+05:30")
            }
        ];

        // Function to check the current video based on the local time
        function getCurrentVideo() {
            let now = new Date();
            let selectedVideo = null;
            let seekPosition = 0;

            for (let video of videos) {
                let startTime = video.starttime;
                let endTime = new Date(startTime.getTime() + video.duration * 1000);

                if (now >= startTime && now < endTime) {
                    selectedVideo = video;
                    seekPosition = Math.floor((now - startTime) / 1000);
                    break;
                }
            }

            return { selectedVideo, seekPosition };
        }

        // Function to set up and play the video
        function setupAndPlayVideo() {
            let { selectedVideo, seekPosition } = getCurrentVideo();

            if (selectedVideo) {
                // Setup the player with the selected video
                jwp.setup({
                    aspectratio: "16:9",
                    width: "100%",
                    height: "100%",
                    sources: [{
                        file: selectedVideo.file,
                        type: "mp4",
                        default: true
                    }],
                    title: selectedVideo.title || "",
                    primary: "html5",
                    preload: "auto", // Ensure the video is preloaded
                    bufferLength: 5,
                    hlshtml: true,
                    controls: false,  // Disable all controls
                    displayPlaybackLabel: false,
                    playbackRateControls: false,
                    liveTimeout: 2,
                    dvrSeekLimit: 0,
                    dvrWindow: 0,
                    autostart: true,
                    volume: 0, // Start muted to ensure autoplay works
                });

                jwp.on('ready', function () {
                    if (seekPosition > 0) {
                        jwp.seek(seekPosition);
                    }

                    // **Unmute the video after it has started playing**
                    jwp.setVolume(100); // Set volume to 100 to unmute

                    // Start video playback immediately
                    jwp.play();

                    // Enter fullscreen immediately after setup
                    if (!document.fullscreenElement) {
                        jwp.setFullscreen(true);
                    }

                    // Prevent touch or click from pausing the video
                    document.querySelector('.jwplayer').addEventListener('click', function (event) {
                        event.stopPropagation();
                        event.preventDefault();
                    });

                    document.querySelector('.jwplayer').addEventListener('touchstart', function (event) {
                        event.stopPropagation();
                        event.preventDefault();
                    });

                    document.querySelector('.jwplayer').addEventListener('dblclick', function (event) {
                        event.stopPropagation();
                        event.preventDefault();
                    });
                });

                jwp.on('pause', function () {
                    jwp.play(); // Force playback to continue
                });

                jwp.on('complete', function () {
                    console.log("Stream completed.");
                });
            } else {
                console.error("No currently playing video.");
            }
        }

        // Start the video when the "Start" button is clicked
        document.getElementById("startButton").addEventListener("click", function () {
            // Hide the start button after it has been clicked
            document.getElementById("startButton").style.display = "none";

            // Immediately start the video and enter fullscreen
            setupAndPlayVideo();
        });
    </script>
</body>

</html>
